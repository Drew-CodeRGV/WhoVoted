<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E90FF"/>
      <stop offset="100%" style="stop-color:#DC143C"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Ballot box body -->
  <rect x="16" y="28" width="32" height="22" rx="2" fill="white" opacity="0.95"/>
  <!-- Ballot slot -->
  <rect x="22" y="26" width="20" height="4" rx="1" fill="white" opacity="0.95"/>
  <rect x="26" y="27" width="12" height="2" rx="0.5" fill="#333"/>
  <!-- Ballot paper -->
  <rect x="25" y="14" width="14" height="16" rx="1" fill="white" opacity="0.9"/>
  <!-- Checkmark on ballot -->
  <polyline points="28,24 31,27 37,19" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Star accent -->
  <polygon points="32,34 33.5,37 37,37.5 34.5,39.5 35,43 32,41.5 29,43 29.5,39.5 27,37.5 30.5,37" fill="#FFD700" opacity="0.9"/>
</svg>
